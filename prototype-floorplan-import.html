<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototype: Floorplan Import — Horizontal Stepper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f1729;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #94a3b8;
  }

  .subtitle {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 24px;
  }

  /* ── Breadcrumb Trail ── */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    font-size: 13px;
    min-height: 28px;
    flex-wrap: wrap;
  }

  .breadcrumb-item {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 6px;
    padding: 4px 12px;
    color: #94a3b8;
    cursor: pointer;
    transition: all 0.2s;
  }

  .breadcrumb-item:hover {
    background: #334155;
    color: #e2e8f0;
  }

  .breadcrumb-item.active {
    background: #1d4ed8;
    border-color: #3b82f6;
    color: #fff;
  }

  .breadcrumb-arrow {
    color: #475569;
    font-size: 16px;
  }

  /* ── Columns Container ── */
  .columns-container {
    display: flex;
    gap: 2px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    overflow: hidden;
    width: 100%;
    max-width: 1200px;
    min-height: 420px;
  }

  /* ── Single Column ── */
  .column {
    flex: 0 0 auto;
    width: 220px;
    display: flex;
    flex-direction: column;
    background: #0f172a;
    border-right: 1px solid #1e293b;
    transition: opacity 0.3s;
  }

  .column:last-child {
    border-right: none;
  }

  .column-header {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #64748b;
    background: #0c1322;
    border-bottom: 1px solid #1e293b;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .column-header .step-number {
    background: #334155;
    color: #94a3b8;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
  }

  .column-header.active .step-number {
    background: #1d4ed8;
    color: #fff;
  }

  .column-items {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  /* ── Item ── */
  .item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2px;
  }

  .item:hover {
    background: #1e293b;
  }

  .item.selected {
    background: #1e3a5f;
    border-left: 3px solid #3b82f6;
  }

  .item .arrow {
    color: #475569;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .item:hover .arrow,
  .item.selected .arrow {
    opacity: 1;
  }

  .item .icon {
    margin-right: 8px;
    font-size: 16px;
  }

  .item-label {
    flex: 1;
    display: flex;
    align-items: center;
  }

  /* ── Column: dimmed when not active path ── */
  .column.future {
    opacity: 0.3;
  }

  /* ── Final Action Column ── */
  .action-column {
    flex: 1;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0c1322;
    gap: 16px;
    padding: 24px;
  }

  .action-column .preview-icon {
    font-size: 64px;
    opacity: 0.3;
  }

  .action-column .message {
    font-size: 14px;
    color: #64748b;
    text-align: center;
    line-height: 1.6;
  }

  .action-column .message.ready {
    color: #22c55e;
  }

  .load-btn {
    background: #1d4ed8;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 32px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    display: none;
  }

  .load-btn:hover {
    background: #2563eb;
  }

  .load-btn.visible {
    display: block;
  }

  /* ── Scrollbar ── */
  .column-items::-webkit-scrollbar { width: 4px; }
  .column-items::-webkit-scrollbar-track { background: transparent; }
  .column-items::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

  /* ── Tag badges ── */
  .tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    margin-left: 8px;
  }
  .tag.dxf { background: #164e63; color: #22d3ee; }
  .tag.pdf { background: #4c1d95; color: #a78bfa; }
  .tag.img { background: #365314; color: #84cc16; }
</style>
</head>
<body>

<h1>Εισαγωγή Κάτοψης στο DXF Panel</h1>
<p class="subtitle">Prototype: Οριζόντια ροή επιλογών — όλα τα βήματα παραμένουν ορατά</p>

<!-- Breadcrumb Trail -->
<div class="breadcrumb" id="breadcrumb"></div>

<!-- Miller Columns -->
<div class="columns-container" id="columns"></div>

<script>
// ══════════════════════════════════════════════════
// DATA — Ιεραρχία: Εταιρεία → Έργο → Γενική Κάτοψη → Όροφος → Κάτοψη
// ══════════════════════════════════════════════════
const DATA = {
  companies: [
    {
      id: 'c1', name: 'Εταιρεία 1', icon: '🏢',
      projects: [
        {
          id: 'p1', name: 'Έργο 1', icon: '📁',
          generalFloorplans: [
            {
              id: 'gf1', name: 'Γενική κάτοψη (Ισόγειο)', icon: '📐',
              floors: [
                {
                  id: 'f1', name: '2ο Υπόγειο', icon: '⬇️',
                  floorplans: [
                    { id: 'fp1', name: 'Κάτοψη ορόφου', type: 'dxf' },
                    { id: 'fp2', name: 'Κάτοψη μονάδας Α1', type: 'pdf' },
                  ]
                },
                {
                  id: 'f2', name: '1ο Υπόγειο', icon: '⬇️',
                  floorplans: [
                    { id: 'fp3', name: 'Κάτοψη ορόφου', type: 'dxf' },
                  ]
                },
                {
                  id: 'f3', name: 'Ισόγειο', icon: '🏠',
                  floorplans: [
                    { id: 'fp4', name: 'Κάτοψη ορόφου', type: 'dxf' },
                    { id: 'fp5', name: 'Κάτοψη μονάδας Β1', type: 'img' },
                    { id: 'fp6', name: 'Κάτοψη μονάδας Β2', type: 'pdf' },
                  ]
                },
                {
                  id: 'f4', name: 'Πατάρι', icon: '🔼',
                  floorplans: [
                    { id: 'fp7', name: 'Κάτοψη ορόφου', type: 'dxf' },
                  ]
                },
              ]
            },
            {
              id: 'gf2', name: 'Βήμα εμπρός', icon: '📐',
              floors: [
                {
                  id: 'f5', name: 'Ισόγειο', icon: '🏠',
                  floorplans: [
                    { id: 'fp8', name: 'Κάτοψη ορόφου', type: 'dxf' },
                  ]
                },
              ]
            },
          ]
        },
        {
          id: 'p2', name: 'Έργο 2', icon: '📁',
          generalFloorplans: []
        },
        {
          id: 'p3', name: 'Έργο 3', icon: '📁',
          generalFloorplans: [
            {
              id: 'gf3', name: 'Βήμα εμπρός', icon: '📐',
              floors: [
                {
                  id: 'f6', name: 'Ισόγειο', icon: '🏠',
                  floorplans: [
                    { id: 'fp9', name: 'Κάτοψη ορόφου', type: 'dxf' },
                  ]
                },
              ]
            }
          ]
        },
        {
          id: 'p4', name: 'Έργο 4', icon: '📁',
          generalFloorplans: []
        },
      ]
    },
    {
      id: 'c2', name: 'Εταιρεία 2', icon: '🏢',
      projects: [
        {
          id: 'p5', name: 'Έργο Α', icon: '📁',
          generalFloorplans: [
            {
              id: 'gf4', name: 'Γενική κάτοψη', icon: '📐',
              floors: [
                {
                  id: 'f7', name: '1ος Όροφος', icon: '1️⃣',
                  floorplans: [
                    { id: 'fp10', name: 'Κάτοψη ορόφου', type: 'dxf' },
                  ]
                },
              ]
            }
          ]
        }
      ]
    },
    {
      id: 'c3', name: 'Εταιρεία 3', icon: '🏢',
      projects: [
        {
          id: 'p6', name: 'Έργο Β', icon: '📁',
          generalFloorplans: [
            {
              id: 'gf5', name: 'Γενική κάτοψη', icon: '📐',
              floors: [
                {
                  id: 'f8', name: '1ος Όροφος', icon: '1️⃣',
                  floorplans: [
                    { id: 'fp11', name: 'Κάτοψη μονάδας', type: 'pdf' },
                  ]
                },
                {
                  id: 'f9', name: '2ος Όροφος', icon: '2️⃣',
                  floorplans: [
                    { id: 'fp12', name: 'Κάτοψη ορόφου', type: 'dxf' },
                    { id: 'fp13', name: 'Κάτοψη μονάδας Γ1', type: 'img' },
                  ]
                },
              ]
            }
          ]
        }
      ]
    },
  ]
};

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
const STEPS = [
  { key: 'company', label: 'Εταιρεία' },
  { key: 'project', label: 'Έργο' },
  { key: 'generalFloorplan', label: 'Γενική Κάτοψη' },
  { key: 'floor', label: 'Όροφος' },
  { key: 'floorplan', label: 'Κάτοψη' },
];

let state = {
  company: null,
  project: null,
  generalFloorplan: null,
  floor: null,
  floorplan: null,
};

// ══════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════
function getItemsForStep(stepIndex) {
  switch(stepIndex) {
    case 0: return DATA.companies.map(c => ({ id: c.id, name: c.name, icon: c.icon, hasChildren: c.projects.length > 0 }));
    case 1: {
      const company = DATA.companies.find(c => c.id === state.company);
      return company ? company.projects.map(p => ({ id: p.id, name: p.name, icon: p.icon, hasChildren: p.generalFloorplans.length > 0 })) : [];
    }
    case 2: {
      const company = DATA.companies.find(c => c.id === state.company);
      const project = company?.projects.find(p => p.id === state.project);
      return project ? project.generalFloorplans.map(gf => ({ id: gf.id, name: gf.name, icon: gf.icon, hasChildren: gf.floors.length > 0 })) : [];
    }
    case 3: {
      const company = DATA.companies.find(c => c.id === state.company);
      const project = company?.projects.find(p => p.id === state.project);
      const gf = project?.generalFloorplans.find(g => g.id === state.generalFloorplan);
      return gf ? gf.floors.map(f => ({ id: f.id, name: f.name, icon: f.icon, hasChildren: f.floorplans.length > 0 })) : [];
    }
    case 4: {
      const company = DATA.companies.find(c => c.id === state.company);
      const project = company?.projects.find(p => p.id === state.project);
      const gf = project?.generalFloorplans.find(g => g.id === state.generalFloorplan);
      const floor = gf?.floors.find(f => f.id === state.floor);
      return floor ? floor.floorplans.map(fp => ({ id: fp.id, name: fp.name, icon: '📄', type: fp.type, hasChildren: false })) : [];
    }
    default: return [];
  }
}

function getStateKey(stepIndex) {
  return STEPS[stepIndex].key;
}

function selectItem(stepIndex, itemId) {
  const key = getStateKey(stepIndex);
  state[key] = itemId;

  // Clear all subsequent selections
  for (let i = stepIndex + 1; i < STEPS.length; i++) {
    state[getStateKey(i)] = null;
  }

  render();
}

function render() {
  const container = document.getElementById('columns');
  const breadcrumb = document.getElementById('breadcrumb');
  container.innerHTML = '';
  breadcrumb.innerHTML = '';

  // Determine how many columns to show
  let visibleColumns = 1; // Always show first
  for (let i = 0; i < STEPS.length; i++) {
    if (state[getStateKey(i)] !== null) {
      visibleColumns = i + 2; // Show next column too
    }
  }
  visibleColumns = Math.min(visibleColumns, STEPS.length);

  // Render breadcrumb
  for (let i = 0; i < STEPS.length; i++) {
    const selectedId = state[getStateKey(i)];
    if (!selectedId && i > 0) break;

    if (i > 0) {
      const arrow = document.createElement('span');
      arrow.className = 'breadcrumb-arrow';
      arrow.textContent = '→';
      breadcrumb.appendChild(arrow);
    }

    const items = getItemsForStep(i);
    const selectedItem = items.find(it => it.id === selectedId);

    const el = document.createElement('span');
    el.className = 'breadcrumb-item' + (selectedId ? ' active' : '');
    el.textContent = selectedItem ? selectedItem.name : STEPS[i].label;
    el.onclick = () => {
      // Reset from this step onwards
      for (let j = i; j < STEPS.length; j++) {
        state[getStateKey(j)] = null;
      }
      render();
    };
    breadcrumb.appendChild(el);
  }

  // Render columns
  for (let i = 0; i < visibleColumns; i++) {
    const step = STEPS[i];
    const items = getItemsForStep(i);
    const selectedId = state[getStateKey(i)];
    const isActiveStep = (i === visibleColumns - 1) || (selectedId === null);

    const col = document.createElement('div');
    col.className = 'column';

    // Header
    const header = document.createElement('div');
    header.className = 'column-header' + (isActiveStep ? ' active' : '');
    header.innerHTML = `<span class="step-number">${i + 1}</span> ${step.label}`;
    col.appendChild(header);

    // Items
    const itemsContainer = document.createElement('div');
    itemsContainer.className = 'column-items';

    if (items.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding: 16px; color: #475569; font-size: 12px; text-align: center;';
      empty.textContent = 'Κενό';
      itemsContainer.appendChild(empty);
    }

    items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'item' + (item.id === selectedId ? ' selected' : '');

      let labelHTML = `<span class="item-label"><span class="icon">${item.icon || ''}</span>${item.name}`;
      if (item.type) {
        labelHTML += `<span class="tag ${item.type}">${item.type.toUpperCase()}</span>`;
      }
      labelHTML += '</span>';

      if (item.hasChildren) {
        labelHTML += '<span class="arrow">›</span>';
      }

      el.innerHTML = labelHTML;
      el.onclick = () => selectItem(i, item.id);
      itemsContainer.appendChild(el);
    });

    col.appendChild(itemsContainer);
    container.appendChild(col);
  }

  // Action column (final preview)
  const actionCol = document.createElement('div');
  actionCol.className = 'action-column';

  if (state.floorplan) {
    const company = DATA.companies.find(c => c.id === state.company);
    const project = company?.projects.find(p => p.id === state.project);
    const gf = project?.generalFloorplans.find(g => g.id === state.generalFloorplan);
    const floor = gf?.floors.find(f => f.id === state.floor);
    const fp = floor?.floorplans.find(f => f.id === state.floorplan);

    actionCol.innerHTML = `
      <div class="preview-icon">📐</div>
      <div class="message ready">
        <strong>Έτοιμο για φόρτωση!</strong><br><br>
        <span style="color:#94a3b8">${company.name} → ${project.name}</span><br>
        <span style="color:#94a3b8">${floor.name} → <strong>${fp.name}</strong></span><br>
        <span class="tag ${fp.type}" style="margin-top:8px;display:inline-block">${fp.type.toUpperCase()}</span>
      </div>
      <button class="load-btn visible" onclick="alert('Φόρτωση: ${fp.name} (${fp.type.toUpperCase()})')">
        Φόρτωση Κάτοψης
      </button>
    `;
  } else {
    const currentStep = Object.values(state).filter(v => v !== null).length;
    actionCol.innerHTML = `
      <div class="preview-icon">📋</div>
      <div class="message">
        Επιλέξτε ${STEPS[currentStep]?.label || 'κάτοψη'}<br>
        <span style="font-size:12px; margin-top:8px; display:block;">Βήμα ${currentStep + 1} / ${STEPS.length}</span>
      </div>
    `;
  }

  container.appendChild(actionCol);
}

// Initial render
render();
</script>

</body>
</html>
