name: 🔬 Functions Integration (ADR-327)

# =============================================================================
# Layer 4 of Defense in Depth for the orphan-cleanup race fix (ADR-327).
#
# Why this workflow
# -----------------
# Layer 1 (SSoT regex `bucket.file().save()`) blocks regressions at presubmit
# but only catches the lexical pattern. A new consumer that *uses* the SSoT
# helper but breaks its pre-claim invariant (e.g. someone "fixes" a bug by
# moving the save() before the claim write) would slip through.
#
# This workflow boots the full Firebase emulator suite (firestore + storage
# + functions) and exercises the real upload-and-wait path: if the pre-claim
# is missing, the orphan-cleanup Cloud Function deletes the file and the
# regression-guard test fires. The happy-path test asserts that production
# code (`uploadPublicFile`) keeps the file alive.
#
# The workflow is triggered narrowly — only PRs that touch storage code
# paths or this workflow itself — to keep CI cheap. Most PRs never run it.
# =============================================================================

on:
  pull_request:
    paths:
      - 'src/services/storage-admin/**'
      - 'functions/src/storage/**'
      - 'functions/src/shared/file-ownership-resolver.ts'
      - 'tests/functions-integration/**'
      - 'jest.config.functions-integration.js'
      - '.github/workflows/functions-integration.yml'
      - 'firebase.json'
  push:
    branches: [main]
    paths:
      - 'src/services/storage-admin/**'
      - 'functions/src/storage/**'
      - 'functions/src/shared/file-ownership-resolver.ts'
      - 'tests/functions-integration/**'
      - 'jest.config.functions-integration.js'
      - '.github/workflows/functions-integration.yml'

concurrency:
  group: functions-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime:
    name: 🧪 Storage + Functions emulator suite
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.0
          run_install: false

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📥 Install root dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 📥 Install functions dependencies
        run: npm --prefix functions ci

      - name: 🛠️  Build functions
        run: npm --prefix functions run build

      - name: 📥 Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-v1
          restore-keys: |
            firebase-emulators-${{ runner.os }}-

      - name: ☕ Setup Java (required by Firestore + Storage emulators)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📥 Install firebase-tools CLI
        run: npm install -g firebase-tools

      - name: 🧪 Run functions integration suite
        run: |
          firebase emulators:exec \
            --only firestore,storage,functions \
            --project demo-nestor-functions-it \
            "jest --config jest.config.functions-integration.js"
        env:
          CI: 'true'

      - name: ✅ Summary
        if: success()
        run: |
          echo "::notice title=Functions Integration::Orphan-cleanup race invariant holds (Layers 2+4)"
