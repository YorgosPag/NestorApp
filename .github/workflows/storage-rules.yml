name: 🔒 Storage Rules (ADR-301 / ADR-657)

# =============================================================================
# Layer 2 of Defense in Depth for Firebase Storage Security Rules — CI mirror
# of the pre-commit CHECK 3.19 gate + full jest emulator suite that cannot run
# in pre-commit (and does not boot on the dev's Windows machine — the Storage
# emulator hangs there identically to the cad-files suite).
#
# Why this workflow
# -----------------
# CHECK 3.19 (pre-commit) runs one fast static validator:
#   1. Coverage manifest parity against storage.rules (matched by @pathId,
#      line-shift-proof — scripts/_shared/storage-rules-parser.js +
#      scripts/check-storage-rules-test-coverage.js).
#
# It deliberately skips the jest emulator suite because spinning up the
# Storage emulator (a Java process) adds material time to every commit AND
# does not run at all on the dev's Windows box. Full runtime validation lives
# here instead, so CI is the authoritative runner: every PR touching rules /
# tests / scanners is gated on both the static check AND the end-to-end
# behavior tests.
#
# Rules under test (ADR-657 two-tier BIM RBAC)
# --------------------------------------------
# storage.rules now enforces the authoring-vs-presentation split; e.g.
# /topo-surfaces/{companyId}/ is AUTHORING (isInternalUserOfCompany on all
# three legs). 17 @pathId annotations anchor the coverage manifest. This
# workflow is the only place the storage emulator actually validates that
# behavior.
#
# Time budget target
# ------------------
# ≤ 3 minutes per run with cache hits (pnpm + firebase-tools + emulator
# binaries). Static job is ~15s, jest job is ~60–120s depending on runner.
# =============================================================================

on:
  pull_request:
    paths:
      - 'storage.rules'
      - 'tests/storage-rules/**'
      - 'jest.config.storage-rules.js'
      - 'scripts/check-storage-rules-test-coverage.js'
      - 'scripts/_shared/storage-rules-parser.js'
      - '.github/workflows/storage-rules.yml'
      - 'firebase.json'
  push:
    branches: [main]
    paths:
      - 'storage.rules'
      - 'tests/storage-rules/**'
      - 'jest.config.storage-rules.js'
      - 'scripts/check-storage-rules-test-coverage.js'
      - 'scripts/_shared/storage-rules-parser.js'
      - '.github/workflows/storage-rules.yml'
      - 'firebase.json'

concurrency:
  group: storage-rules-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Static validation — fast, no emulator, no dependency install beyond Node.
  # Mirrors the pre-commit CHECK 3.19 pipeline but runs in repo-wide (`--all`)
  # mode so pre-existing backlog is surfaced for PR review even when the
  # touched files themselves are clean.
  # ---------------------------------------------------------------------------
  static:
    name: 🔍 Coverage Manifest (CHECK 3.19 — full scan)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The coverage audit script parses the coverage manifest via the
      # TypeScript compiler API. Install TypeScript without modifying the
      # lockfile.
      - name: 📦 Install TypeScript (required by manifest parser)
        run: npm install --no-save typescript --legacy-peer-deps
        env:
          npm_config_engine_strict: 'false'

      - name: 🔍 CHECK 3.19 — Coverage manifest (full scan)
        run: node scripts/check-storage-rules-test-coverage.js --all --verbose

      - name: ✅ Summary
        if: success()
        run: |
          echo "::notice title=Storage Rules Static::Coverage manifest PASS"

  # ---------------------------------------------------------------------------
  # Runtime validation — boots the Storage emulator, runs the full jest suite.
  # This is the gate that catches rule-behavior drift the static validation
  # cannot detect by design, and the only place the Storage emulator runs at
  # all (it hangs on the dev's Windows machine).
  # ---------------------------------------------------------------------------
  runtime:
    name: 🧪 Jest Suite (Storage Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      # pnpm store path for cache key stability
      PNPM_STORE_PATH: ~/.local/share/pnpm/store
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.0
          run_install: false

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # Only the packages needed for rules testing:
      #   - @firebase/rules-unit-testing (emulator client)
      #   - firebase-admin (peer)
      #   - jest + @swc/jest (transform)
      #   - firebase-tools (emulator binary + emulators:exec runner)
      #
      # `--frozen-lockfile` ensures the CI run matches the committed lockfile;
      # `--ignore-scripts` skips the app's postinstall (patch-package +
      # radix react19 patch) which are irrelevant for a rules-only run and
      # would otherwise fail on missing files.
      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 📥 Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-v1
          restore-keys: |
            firebase-emulators-${{ runner.os }}-

      - name: ☕ Setup Java (required by Storage emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # firebase-tools is not a project devDependency (too large). Install
      # globally so `firebase emulators:exec` is available in PATH.
      - name: 📥 Install firebase-tools CLI
        run: npm install -g firebase-tools

      # `firebase emulators:exec --only storage,auth` boots the Storage + Auth
      # emulators, runs jest, and shuts them down on exit. Single-line,
      # deterministic, no background process bookkeeping. Matches the local
      # `pnpm test:storage-rules:emulator` script for dev parity.
      #
      # NOTE: if `--only storage,auth` proves insufficient (the Storage
      # emulator leans on the Firestore rules engine internally), the
      # sanctioned fix is to add `firestore` to the `--only` list in the
      # `test:storage-rules:emulator` npm script (package.json) — do NOT fork
      # the command here.
      - name: 🧪 Run Storage rules jest suite
        run: pnpm test:storage-rules:emulator
        env:
          CI: 'true'

      - name: ✅ Summary
        if: success()
        run: |
          echo "::notice title=Storage Rules Runtime::All jest suites passed against live emulator"
