name: 🧪 Coverage Floor Ratchet (ADR-598 G3)

# =============================================================================
# ADR-598 ΦΑΣΗ 3 · G3 — test-coverage floor ratchet (Layer-2 CI, N.17).
#
# Runs the jest suite with --coverage (json-summary reporter, configured in
# jest.config.js) and then scripts/check-coverage-ratchet.js, which reads
# coverage/coverage-summary.json and blocks when line coverage falls below the
# committed baseline (.coverage-baseline.json). Ratchet UP only. The full
# coverage run is heavy → CI only (N.17); the ratchet script is a pure consumer
# of the summary JSON.
#
# Seeding: same seed dispatch as the ΦΑΣΗ 2 gates — seed=true writes the
# baseline, uploads it + echoes to summary; Giorgio commits it (no auto-commit).
# =============================================================================

on:
  pull_request:
    paths:
      - 'src/**'
      - 'jest.config.js'
      - '.coverage-baseline.json'
      - 'scripts/check-coverage-ratchet.js'
      - 'scripts/lib/ratchet-baseline.js'
      - '.github/workflows/coverage-ratchet.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'jest.config.js'
      - '.coverage-baseline.json'
      - 'scripts/check-coverage-ratchet.js'
      - 'scripts/lib/ratchet-baseline.js'
      - '.github/workflows/coverage-ratchet.yml'
  workflow_dispatch:
    inputs:
      seed:
        description: 'Seed/refresh the baseline (writes JSON, uploads artifact, does NOT commit)'
        type: boolean
        default: false

concurrency:
  group: coverage-ratchet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage-ratchet:
    name: 🔒 Coverage Floor Ratchet (ADR-598 G3)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.0
          run_install: false

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      # The expensive step. Produces coverage/coverage-summary.json. CI only.
      # continue-on-error: coverage must be collected even if some suites fail;
      # the ratchet gate — not this step — is the authority on pass/fail.
      - name: 🧪 Jest coverage
        run: pnpm run test:coverage
        continue-on-error: true
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: 🧪 Coverage floor ratchet (seed or check)
        run: |
          if [ "${{ inputs.seed }}" = "true" ]; then
            node scripts/check-coverage-ratchet.js --write-baseline
          else
            node scripts/check-coverage-ratchet.js --check
          fi

      - name: 📤 Upload seeded baseline (seed mode only)
        if: ${{ inputs.seed == true }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-baseline
          path: .coverage-baseline.json
          include-hidden-files: true # dotfile baseline — v4 excludes hidden by default

      - name: 📝 Echo baseline to summary (seed mode only)
        if: ${{ inputs.seed == true }}
        run: |
          echo '### G3 coverage baseline (commit this file)' >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat .coverage-baseline.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: ✅ Summary
        if: ${{ success() && inputs.seed != true }}
        run: echo "::notice title=Coverage Floor Ratchet (G3)::line coverage held or rose vs .coverage-baseline.json"
