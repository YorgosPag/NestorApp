name: 🌐 i18n Governance (ADR-279)

# =============================================================================
# Layer 2 of Defense in Depth — CI mirror of the pre-commit i18n pipeline.
#
# Why this exists
# ---------------
# The pre-commit hook can be bypassed with `git commit --no-verify`, skipped on
# agents that forget to activate core.hooksPath, or drift out of sync with the
# tracked script. This workflow re-runs the same i18n governance checks against
# every push / PR so that enforcement is guaranteed regardless of how the
# commit was authored.
#
# It is intentionally narrow: ONLY i18n governance checks run here so that it
# stays fast (~30s) and does not get disabled under time pressure the way the
# broader quality-gates.yml / unit.yml workflows have been in the past. Every
# step must be dependency-free pure Node.js — that is what lets this workflow
# skip `pnpm install` entirely. Anything needing a build or a typecheck belongs
# in its own workflow (see ts-error-gate.yml), not here.
#
# Regression that motivated this workflow
# ---------------------------------------
# On 2026-04-11 the /contacts → Δημόσια Υπηρεσία form rendered raw dotted i18n
# keys because `contacts-relationships` was missing from SERVICE_FORM_NAMESPACES
# after ADR-280 namespace splitting. CHECK 3.8 and CHECK 3.12 both passed
# because the keys *existed* in locale files — but the runtime resolver could
# not reach them. CHECK 3.13 closes that gap, and this workflow ensures the
# gap stays closed in CI even when pre-commit is bypassed.
# =============================================================================

on:
  pull_request:
    paths:
      - 'src/i18n/**'
      - 'src/components/generic/i18n/**'
      - 'src/config/**'
      - 'src/app/**/service-config.ts'
      - 'src/app/**/individual-config.ts'
      - 'scripts/check-i18n-*.js'
      - 'scripts/check-audit-value-catalogs.js'
      - 'scripts/validate-translations.js'
      - 'scripts/_shared/i18n-governance.js'
      - '.i18n-*.json'
      - '.github/workflows/i18n-governance.yml'
  push:
    branches: [main]
    paths:
      - 'src/i18n/**'
      - 'src/components/generic/i18n/**'
      - 'src/config/**'
      - 'scripts/check-i18n-*.js'
      - 'scripts/check-audit-value-catalogs.js'
      - 'scripts/validate-translations.js'
      - 'scripts/_shared/i18n-governance.js'
      - '.i18n-*.json'

concurrency:
  group: i18n-governance-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  governance:
    name: 🔒 i18n Governance Ratchets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # We do not need a full dependency install — every governance script is
      # pure Node.js (no runtime deps) that walks the repo filesystem. This
      # keeps the workflow under 30s and independent of pnpm-lock churn.

      - name: 🔍 CHECK 3.13 — i18n runtime resolver reachability (full scan)
        run: node scripts/check-i18n-resolver-reachability.js --all

      - name: 🔍 CHECK 3.14 — Audit value catalogs SSoT parity
        run: node scripts/check-audit-value-catalogs.js

      # ADR-666 — EL↔EN completeness. Complementary to CHECK 3.8, not a duplicate:
      # 3.8 walks code→locale (a t('key') with no matching entry); this walks
      # locale→locale (a key present in el but missing from en). Neither sees the
      # other's gap. This became gateable only after ADR-666 deleted the 80
      # committed pseudo JSON files that kept it at EXIT 1 with 693 lines of rot.
      #
      # Scoped deliberately to `validate:i18n` alone. Do NOT swap this for the
      # `i18n:check` npm script: it bundles validate:i18n-config (2 pre-existing
      # errors) and validate:i18n-manifest (3), which would red the workflow on
      # day one for reasons unrelated to translation completeness.
      - name: 🔍 validate:i18n — EL↔EN translation completeness (ADR-666)
        run: node scripts/validate-translations.js

      # Note: CHECK 3.8 (missing i18n keys) and CHECK 3.12 (option-label
      # integrity) are per-file scanners driven by staged filenames; they do
      # not support a repo-wide --all mode and have legacy baselines that the
      # pre-commit hook enforces ratchet-style. Running them in CI without a
      # file list would be a no-op, so they are intentionally omitted here
      # and enforced solely by Layer 1 (tracked pre-commit hook).

      - name: ✅ Summary
        if: success()
        run: |
          echo "::notice title=i18n Governance::All ratchet checks passed"
          echo "CHECK 3.13 (resolver reachability): PASS"
          echo "CHECK 3.14 (audit catalogs parity): PASS"
          echo "validate:i18n (EL/EN completeness): PASS"
