name: 🧮 Type-Complexity Ratchet (ADR-598 G14)

# =============================================================================
# ADR-598 ΦΑΣΗ 2 · G14 — type-complexity ratchet (Layer-2 CI, N.17).
#
# Runs `tsc --extendedDiagnostics --noEmit` (full type-check → heavy → never in
# the pre-commit hook) and blocks when the `Instantiations` counter rises above
# baseline*(1 + tolerancePct/100). The floor lives in
# .type-complexity-baseline.json; the tolerance (default 3%) is governed by
# config/quality-gates/type-complexity-budget.json (mirrors the ADR-027
# ts-error-budget pattern). Ratchet DOWN only.
#
# Seeding: same seed dispatch as the other ΦΑΣΗ 2 gates — seed=true writes the
# baseline, uploads it + echoes to summary; Giorgio commits it (no auto-commit).
# =============================================================================

on:
  pull_request:
    paths:
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - 'tsconfig.json'
      - '.type-complexity-baseline.json'
      - 'config/quality-gates/type-complexity-budget.json'
      - 'scripts/check-type-complexity-ratchet.js'
      - 'scripts/lib/ratchet-baseline.js'
      - '.github/workflows/type-complexity-ratchet.yml'
  push:
    branches: [main]
    paths:
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - 'tsconfig.json'
      - '.type-complexity-baseline.json'
      - 'config/quality-gates/type-complexity-budget.json'
      - 'scripts/check-type-complexity-ratchet.js'
      - 'scripts/lib/ratchet-baseline.js'
      - '.github/workflows/type-complexity-ratchet.yml'
  workflow_dispatch:
    inputs:
      seed:
        description: 'Seed/refresh the baseline (writes JSON, uploads artifact, does NOT commit)'
        type: boolean
        default: false

concurrency:
  group: type-complexity-ratchet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-complexity-ratchet:
    name: 🔒 Type-Complexity Ratchet (ADR-598 G14)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.0
          run_install: false

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # No --ignore-scripts: the full type-check needs the framework/type
      # declarations that postinstall steps materialise.
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧮 Type-complexity ratchet (seed or check)
        run: |
          if [ "${{ inputs.seed }}" = "true" ]; then
            node scripts/check-type-complexity-ratchet.js --write-baseline
          else
            node scripts/check-type-complexity-ratchet.js --check
          fi
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: 📤 Upload seeded baseline (seed mode only)
        if: ${{ inputs.seed == true }}
        uses: actions/upload-artifact@v4
        with:
          name: type-complexity-baseline
          path: .type-complexity-baseline.json
          include-hidden-files: true # dotfile baseline — v4 excludes hidden by default

      - name: 📝 Echo baseline to summary (seed mode only)
        if: ${{ inputs.seed == true }}
        run: |
          echo '### G14 type-complexity baseline (commit this file)' >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat .type-complexity-baseline.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: ✅ Summary
        if: ${{ success() && inputs.seed != true }}
        run: echo "::notice title=Type-Complexity Ratchet (G14)::Instantiations within budget vs .type-complexity-baseline.json"
