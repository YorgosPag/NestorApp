name: 📦 Bundle-Size Ratchet (ADR-598 G6)

# =============================================================================
# ADR-598 ΦΑΣΗ 2 · G6 — bundle-size ratchet (Layer-2 CI, N.17).
#
# Builds the app (`pnpm run build` = build:tokens && next build) and then runs
# scripts/check-bundle-size-ratchet.js, which REUSES analyzeNextBuild() from
# scripts/bundle-analyzer.js to read `.next/static` and blocks when totalSize
# rises above baseline*(1 + tolerancePct/100) (.bundle-size-baseline.json,
# default 2% slack). Ratchet DOWN only. The build is the expensive step → CI
# only (N.17); the ratchet script is a pure consumer of `.next`.
#
# Seeding: same seed dispatch as the other ΦΑΣΗ 2 gates — seed=true writes the
# baseline, uploads it + echoes to summary; Giorgio commits it (no auto-commit).
# =============================================================================

on:
  pull_request:
    paths:
      - 'src/**'
      - 'next.config.*'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.bundle-size-baseline.json'
      - 'scripts/check-bundle-size-ratchet.js'
      - 'scripts/bundle-analyzer.js'
      - 'scripts/lib/ratchet-baseline.js'
      - '.github/workflows/bundle-ratchet.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'next.config.*'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.bundle-size-baseline.json'
      - 'scripts/check-bundle-size-ratchet.js'
      - 'scripts/bundle-analyzer.js'
      - 'scripts/lib/ratchet-baseline.js'
      - '.github/workflows/bundle-ratchet.yml'
  workflow_dispatch:
    inputs:
      seed:
        description: 'Seed/refresh the baseline (writes JSON, uploads artifact, does NOT commit)'
        type: boolean
        default: false

concurrency:
  group: bundle-ratchet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle-ratchet:
    name: 🔒 Bundle-Size Ratchet (ADR-598 G6)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.0
          run_install: false

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      # The expensive step. Produces .next/static that the ratchet reads. CI only.
      - name: 🏗️ Production build
        run: pnpm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: 📦 Bundle-size ratchet (seed or check)
        run: |
          if [ "${{ inputs.seed }}" = "true" ]; then
            node scripts/check-bundle-size-ratchet.js --write-baseline
          else
            node scripts/check-bundle-size-ratchet.js --check
          fi

      - name: 📤 Upload seeded baseline (seed mode only)
        if: ${{ inputs.seed == true }}
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-baseline
          path: .bundle-size-baseline.json

      - name: 📝 Echo baseline to summary (seed mode only)
        if: ${{ inputs.seed == true }}
        run: |
          echo '### G6 bundle-size baseline (commit this file)' >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat .bundle-size-baseline.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: ✅ Summary
        if: ${{ success() && inputs.seed != true }}
        run: echo "::notice title=Bundle-Size Ratchet (G6)::totalSize within budget vs .bundle-size-baseline.json"
