name: 📦 Bundle-Size Ratchet (ADR-598 G6)

# =============================================================================
# ADR-598 ΦΑΣΗ 2 · G6 — bundle-size ratchet (Layer-2 CI, N.17).
#
# Builds the app (`pnpm run build` = build:tokens && next build) and then runs
# scripts/check-bundle-size-ratchet.js, which REUSES analyzeNextBuild() from
# scripts/bundle-analyzer.js to read `.next/static` and blocks when totalSize
# rises above baseline*(1 + tolerancePct/100) (.bundle-size-baseline.json,
# default 2% slack). Ratchet DOWN only. The build is the expensive step → CI
# only (N.17); the ratchet script is a pure consumer of `.next`.
#
# Seeding: same seed dispatch as the other ΦΑΣΗ 2 gates — seed=true writes the
# baseline, uploads it + echoes to summary; Giorgio commits it (no auto-commit).
# =============================================================================

on:
  pull_request:
    paths:
      - 'src/**'
      - 'next.config.*'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.bundle-size-baseline.json'
      - 'scripts/check-bundle-size-ratchet.js'
      - 'scripts/bundle-analyzer.js'
      - 'scripts/lib/ratchet-baseline.js'
      - '.github/workflows/bundle-ratchet.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'next.config.*'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.bundle-size-baseline.json'
      - 'scripts/check-bundle-size-ratchet.js'
      - 'scripts/bundle-analyzer.js'
      - 'scripts/lib/ratchet-baseline.js'
      - '.github/workflows/bundle-ratchet.yml'
  workflow_dispatch:
    inputs:
      seed:
        description: 'Seed/refresh the baseline (writes JSON, uploads artifact, does NOT commit)'
        type: boolean
        default: false

concurrency:
  group: bundle-ratchet-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  bundle-ratchet:
    name: 🔒 Bundle-Size Ratchet (ADR-598 G6)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.0
          run_install: false

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      # The expensive step. Produces .next/static that the ratchet reads. CI only.
      # Heap matches docker-build.yml (the canonical production build): a full
      # `next build` OOMs at 6144 MB, so use 12288 MB (ubuntu-latest has 16 GB).
      - name: 🏗️ Production build
        run: pnpm run build
        # Firebase public config mirrors docker-build.yml (the canonical build).
        # Without it, static page-data collection for routes that init Firebase
        # at module load (e.g. /api/admin/migrations/execute) throws
        # `auth/invalid-api-key` and fails the build. Browser-exposed, not secret.
        env:
          NODE_OPTIONS: --max-old-space-size=12288
          NODE_ENV: production
          DISABLE_SENTRY_WEBPACK: 'true'
          NEXT_TELEMETRY_DISABLED: '1'
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyAcqK3o-zPmXodFPr-gG328QJHlcEc6g1k
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:157616068729:web:c7dc1ed6661c895ee19ca8'
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: pagonis-87766.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '157616068729'
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: pagonis-87766
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: pagonis-87766.firebasestorage.app
          NEXT_PUBLIC_SENTRY_DSN: https://ceba8fb4650f8d54df1b489f6360e109@o4511056899014656.ingest.de.sentry.io/4511056927981648
          NEXT_PUBLIC_ADMIN_EMAIL: errors@inbound.nestorconstruct.gr
          NEXT_PUBLIC_ADMIN_EMAILS: 'pagonis.oe@gmail.com,georgios.pagonis@gmail.com,giorgos@pagonis.gr,pagonis@nestorconstruct.gr,info@nestorconstruct.gr'
          NEXT_PUBLIC_DEFAULT_COMPANY_ID: comp_9c7c1a50-f370-466d-bdf7-aa7b2b2d7757
          NEXT_PUBLIC_DEBUG: 'false'
          NEXT_PUBLIC_DXF_AI_ASSISTANT: 'false'
          NEXT_PUBLIC_COMPANY_NAME: Pagonis Energo
          NEXT_PUBLIC_COMPANY_EMAIL: georgios.pagonis@gmail.com
          NEXT_PUBLIC_COMPANY_PHONE: '6974050023'
          NEXT_PUBLIC_COMPANY_WEBSITE: https://nestorconstruct.gr

      - name: 📦 Bundle-size ratchet (seed or check)
        run: |
          if [ "${{ inputs.seed }}" = "true" ]; then
            node scripts/check-bundle-size-ratchet.js --write-baseline
          else
            node scripts/check-bundle-size-ratchet.js --check
          fi

      - name: 📤 Upload seeded baseline (seed mode only)
        if: ${{ inputs.seed == true }}
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-baseline
          path: .bundle-size-baseline.json
          include-hidden-files: true # dotfile baseline — v4 excludes hidden by default

      - name: 📝 Echo baseline to summary (seed mode only)
        if: ${{ inputs.seed == true }}
        run: |
          echo '### G6 bundle-size baseline (commit this file)' >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat .bundle-size-baseline.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: ✅ Summary
        if: ${{ success() && inputs.seed != true }}
        run: echo "::notice title=Bundle-Size Ratchet (G6)::totalSize within budget vs .bundle-size-baseline.json"
